name: sag

# 默认面向个人本地使用：SQLite + LanceDB，无需额外数据库服务。
# 数据统一写入 sagdata 卷，重建容器不会丢失。
services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        SAG_API_EXTRAS: ""
    environment:
      SAG_ENVIRONMENT: ${SAG_ENVIRONMENT:-dev}
      SAG_DEBUG: "false"
      # 仅供本地快速启动；切换 prod 时应用会拒绝这个已知弱密钥。
      SAG_SECRET_KEY: ${SAG_SECRET_KEY:-dev-insecure-secret-change-me-in-production-0123456789}
      SAG_CORS_ORIGINS: ${SAG_CORS_ORIGINS:-http://localhost:3000}
      SAG_ALLOW_REGISTRATION: ${SAG_ALLOW_REGISTRATION:-false}
      # 四个斜杠表示容器内绝对路径 /data/sag.db。
      SAG_DATABASE_URL: sqlite+aiosqlite:////data/sag.db
      SAG_DATA_DIR: /data/engine
      SAG_UPLOAD_DIR: /data/uploads
      SAG_SAG_VECTOR_PROVIDER: lancedb
      SAG_SAG_LANGUAGE: ${SAG_SAG_LANGUAGE:-zh}
      # LLM / Embedding（OpenAI 兼容；留空也能启动，之后可在设置页配置）
      SAG_LLM_BASE_URL: ${SAG_LLM_BASE_URL:-}
      SAG_LLM_API_KEY: ${SAG_LLM_API_KEY:-}
      SAG_LLM_MODEL: ${SAG_LLM_MODEL:-qwen3.6-flash}
      SAG_EMBEDDING_MODEL: ${SAG_EMBEDDING_MODEL:-bge-large-en-v1.5}
      SAG_EMBEDDING_BASE_URL: ${SAG_EMBEDDING_BASE_URL:-}
      SAG_EMBEDDING_API_KEY: ${SAG_EMBEDDING_API_KEY:-}
      SAG_JOB_MAX_ATTEMPTS: ${SAG_JOB_MAX_ATTEMPTS:-3}
      SAG_ENGINE_CACHE_SIZE: ${SAG_ENGINE_CACHE_SIZE:-16}
      SAG_ENGINE_WARMUP_COUNT: ${SAG_ENGINE_WARMUP_COUNT:-4}
    volumes:
      - sagdata:/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/system/ready').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # 浏览器直连的 API 地址（构建期内联）；修改后需重建 web。
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://localhost:3000').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  sagdata:
