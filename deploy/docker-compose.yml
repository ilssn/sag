name: zleap

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zleap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zleap}
      POSTGRES_DB: ${POSTGRES_DB:-zleap}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zleap} -d ${POSTGRES_DB:-zleap}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ZLEAP_ENVIRONMENT: prod
      ZLEAP_DEBUG: "false"
      ZLEAP_SECRET_KEY: ${ZLEAP_SECRET_KEY:-please-change-this-in-production-0123456789}
      ZLEAP_CORS_ORIGINS: ${ZLEAP_CORS_ORIGINS:-http://localhost:3000}
      ZLEAP_ALLOW_REGISTRATION: ${ZLEAP_ALLOW_REGISTRATION:-true}
      # zleap 元数据 → Postgres
      ZLEAP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zleap}:${POSTGRES_PASSWORD:-zleap}@db:5432/${POSTGRES_DB:-zleap}
      ZLEAP_DATA_DIR: /data/zleap
      ZLEAP_UPLOAD_DIR: /data/uploads
      # zleap-sag → pgvector 单库统一
      ZLEAP_SAG_VECTOR_PROVIDER: pgvector
      ZLEAP_SAG_RELATIONAL_PROVIDER: postgres
      ZLEAP_SAG_PG_HOST: db
      ZLEAP_SAG_PG_PORT: "5432"
      ZLEAP_SAG_PG_USER: ${POSTGRES_USER:-zleap}
      ZLEAP_SAG_PG_PASSWORD: ${POSTGRES_PASSWORD:-zleap}
      ZLEAP_SAG_PG_DATABASE: ${POSTGRES_DB:-zleap}
      ZLEAP_SAG_LANGUAGE: ${ZLEAP_SAG_LANGUAGE:-zh}
      # LLM / Embedding（OpenAI 兼容）
      ZLEAP_LLM_BASE_URL: ${ZLEAP_LLM_BASE_URL:-}
      ZLEAP_LLM_API_KEY: ${ZLEAP_LLM_API_KEY:-}
      ZLEAP_LLM_MODEL: ${ZLEAP_LLM_MODEL:-qwen3.6-flash}
      ZLEAP_EMBEDDING_MODEL: ${ZLEAP_EMBEDDING_MODEL:-bge-large-en-v1.5}
      ZLEAP_EMBEDDING_BASE_URL: ${ZLEAP_EMBEDDING_BASE_URL:-}
      ZLEAP_EMBEDDING_API_KEY: ${ZLEAP_EMBEDDING_API_KEY:-}
    volumes:
      - musedata:/data
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        # 浏览器直连的 API 地址（构建期内联）；生产改成公网 API 地址后需重建 web
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  pgdata:
  musedata:
