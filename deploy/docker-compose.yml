name: sag

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sag}
      POSTGRES_DB: ${POSTGRES_DB:-sag}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sag} -d ${POSTGRES_DB:-sag}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SAG_ENVIRONMENT: prod
      SAG_DEBUG: "false"
      SAG_SECRET_KEY: ${SAG_SECRET_KEY:-please-change-this-in-production-0123456789}
      SAG_CORS_ORIGINS: ${SAG_CORS_ORIGINS:-http://localhost:3000}
      SAG_ALLOW_REGISTRATION: ${SAG_ALLOW_REGISTRATION:-true}
      # sag 元数据 → Postgres
      SAG_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sag}:${POSTGRES_PASSWORD:-sag}@db:5432/${POSTGRES_DB:-sag}
      SAG_DATA_DIR: /data/sag
      SAG_UPLOAD_DIR: /data/uploads
      # zleap-sag → pgvector 单库统一
      SAG_SAG_VECTOR_PROVIDER: pgvector
      SAG_SAG_RELATIONAL_PROVIDER: postgres
      SAG_SAG_PG_HOST: db
      SAG_SAG_PG_PORT: "5432"
      SAG_SAG_PG_USER: ${POSTGRES_USER:-sag}
      SAG_SAG_PG_PASSWORD: ${POSTGRES_PASSWORD:-sag}
      SAG_SAG_PG_DATABASE: ${POSTGRES_DB:-sag}
      SAG_SAG_LANGUAGE: ${SAG_SAG_LANGUAGE:-zh}
      # LLM / Embedding（OpenAI 兼容）
      SAG_LLM_BASE_URL: ${SAG_LLM_BASE_URL:-}
      SAG_LLM_API_KEY: ${SAG_LLM_API_KEY:-}
      SAG_LLM_MODEL: ${SAG_LLM_MODEL:-qwen3.6-flash}
      SAG_EMBEDDING_MODEL: ${SAG_EMBEDDING_MODEL:-bge-large-en-v1.5}
      SAG_EMBEDDING_BASE_URL: ${SAG_EMBEDDING_BASE_URL:-}
      SAG_EMBEDDING_API_KEY: ${SAG_EMBEDDING_API_KEY:-}
    volumes:
      - musedata:/data
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      # 就绪探针：DB 可连通才算健康
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/system/ready').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        # 浏览器直连的 API 地址（构建期内联）；生产改成公网 API 地址后需重建 web
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  pgdata:
  musedata:
