name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  backend:
    name: 后端 · ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: 安装依赖
        run: pip install -e ".[dev]"
      - name: Lint（ruff）
        run: ruff check sag_api/ sag_agent/ tests/
      - name: 测试（离线全套）
        run: python -m pytest -q

  frontend:
    name: 前端 · tsc + next build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: 安装依赖
        run: npm ci
      - name: 类型检查
        run: npx tsc --noEmit
      - name: 生产构建
        run: npm run build
