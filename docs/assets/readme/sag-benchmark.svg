<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#E9E7EE"/>
    </pattern>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#18181B" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1600" height="1040" fill="#F7F7F8"/>
  <rect width="1600" height="1040" fill="url(#dot-grid)" opacity="0.55"/>
  <rect x="72" y="58" width="1456" height="944" rx="8" fill="white" stroke="#DDDDE2" filter="url(#soft-shadow)"/>

  <g font-family="Inter, Arial, sans-serif" fill="#18181B">
    <text x="120" y="118" font-size="18" font-weight="700">SAG BENCHMARK · MULTI-HOP RETRIEVAL</text>
    <text x="120" y="177" font-size="42" font-weight="700">A new SOTA, measured at the top of the ranking</text>
    <text x="120" y="215" font-size="20" fill="#64646D">Same embedding and LLM configuration. Recall@K on three standard multi-hop benchmarks.</text>

    <line x1="120" y1="252" x2="1480" y2="252" stroke="#E2E2E7"/>

    <text x="120" y="308" font-size="64" font-weight="750">8 / 9</text>
    <text x="120" y="342" font-size="18" font-weight="650">best Recall@1, @2 and @5 results</text>
    <text x="120" y="370" font-size="16" fill="#73737C">Only 2WikiMultiHopQA Recall@5 is not the best.</text>

    <rect x="510" y="282" width="1" height="92" fill="#E2E2E7"/>
    <circle cx="562" cy="310" r="8" fill="#F59E0B"/>
    <text x="584" y="317" font-size="18" font-weight="650">Event-level semantics</text>
    <circle cx="562" cy="352" r="8" fill="#8B5CF6"/>
    <text x="584" y="359" font-size="18" font-weight="650">Entity-indexed expansion</text>

    <rect x="980" y="282" width="1" height="92" fill="#E2E2E7"/>
    <text x="1030" y="309" font-size="16" fill="#73737C">EVALUATION</text>
    <text x="1030" y="341" font-size="22" font-weight="700">3 datasets · 1,000 queries each</text>
    <text x="1030" y="369" font-size="16" fill="#73737C">BGE-Large-EN-v1.5 + Qwen3.6-Flash</text>

    <line x1="120" y1="414" x2="1480" y2="414" stroke="#E2E2E7"/>

    <text x="120" y="464" font-size="18" font-weight="700">AVERAGE RECALL</text>
    <text x="120" y="493" font-size="16" fill="#73737C">Higher is better. Values are percentages.</text>

    <text x="120" y="560" font-size="22" font-weight="700">Recall@2</text>
    <text x="120" y="592" font-size="16" fill="#73737C">SAG</text>
    <rect x="250" y="570" width="634" height="28" rx="4" fill="#18181B"/>
    <text x="900" y="593" font-size="18" font-weight="700">79.30</text>
    <text x="120" y="632" font-size="16" fill="#73737C">HippoRAG 2</text>
    <rect x="250" y="610" width="545" height="28" rx="4" fill="#DADAE0"/>
    <text x="811" y="633" font-size="18" fill="#64646D">68.14</text>
    <rect x="970" y="556" width="116" height="42" rx="6" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="991" y="583" font-size="17" font-weight="700" fill="#C2410C">+11.16</text>

    <text x="120" y="702" font-size="22" font-weight="700">Recall@5</text>
    <text x="120" y="734" font-size="16" fill="#73737C">SAG</text>
    <rect x="250" y="712" width="705" height="28" rx="4" fill="#18181B"/>
    <text x="971" y="735" font-size="18" font-weight="700">88.18</text>
    <text x="120" y="774" font-size="16" fill="#73737C">HippoRAG 2</text>
    <rect x="250" y="752" width="666" height="28" rx="4" fill="#DADAE0"/>
    <text x="932" y="775" font-size="18" fill="#64646D">83.28</text>
    <rect x="1024" y="698" width="104" height="42" rx="6" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="1046" y="725" font-size="17" font-weight="700" fill="#6D28D9">+4.90</text>

    <line x1="120" y1="824" x2="1480" y2="824" stroke="#E2E2E7"/>

    <text x="120" y="866" font-size="16" font-weight="700">DATASET</text>
    <text x="500" y="866" font-size="16" font-weight="700">RECALL@1</text>
    <text x="830" y="866" font-size="16" font-weight="700">RECALL@2</text>
    <text x="1160" y="866" font-size="16" font-weight="700">RECALL@5</text>

    <text x="120" y="914" font-size="18" font-weight="650">HotpotQA</text>
    <circle cx="480" cy="907" r="6" fill="#18181B"/><text x="500" y="914" font-size="18" font-weight="650">47.80</text><text x="570" y="914" font-size="14" fill="#87878F">vs 44.40</text>
    <circle cx="810" cy="907" r="6" fill="#18181B"/><text x="830" y="914" font-size="18" font-weight="650">91.55</text><text x="900" y="914" font-size="14" fill="#87878F">vs 78.35</text>
    <circle cx="1140" cy="907" r="6" fill="#18181B"/><text x="1160" y="914" font-size="18" font-weight="650">96.50</text><text x="1230" y="914" font-size="14" fill="#87878F">vs 94.35</text>

    <text x="120" y="950" font-size="18" font-weight="650">2WikiMultiHopQA</text>
    <circle cx="480" cy="943" r="6" fill="#18181B"/><text x="500" y="950" font-size="18" font-weight="650">43.53</text><text x="570" y="950" font-size="14" fill="#87878F">vs 42.38</text>
    <circle cx="810" cy="943" r="6" fill="#18181B"/><text x="830" y="950" font-size="18" font-weight="650">82.30</text><text x="900" y="950" font-size="14" fill="#87878F">vs 76.55</text>
    <circle cx="1140" cy="943" r="6" fill="white" stroke="#A1A1AA" stroke-width="2"/><text x="1160" y="950" font-size="18" fill="#73737C">88.00</text><text x="1230" y="950" font-size="14" fill="#87878F">vs 90.35</text>

    <text x="120" y="986" font-size="18" font-weight="650">MuSiQue</text>
    <circle cx="480" cy="979" r="6" fill="#18181B"/><text x="500" y="986" font-size="18" font-weight="650">36.17</text><text x="570" y="986" font-size="14" fill="#87878F">vs 30.65</text>
    <circle cx="810" cy="979" r="6" fill="#18181B"/><text x="830" y="986" font-size="18" font-weight="650">64.05</text><text x="900" y="986" font-size="14" fill="#87878F">vs 49.52</text>
    <circle cx="1140" cy="979" r="6" fill="#18181B"/><text x="1160" y="986" font-size="18" font-weight="650">80.04</text><text x="1230" y="986" font-size="14" fill="#87878F">vs 65.13</text>
  </g>
</svg>
