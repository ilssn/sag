<svg width="1800" height="1180" viewBox="0 0 1800 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="arch-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#E9E7EE"/>
    </pattern>
    <filter id="arch-shadow" x="-20%" y="-20%" width="140%" height="140%">
