# SAG web 静态托管（ADR-0006：与桌面共用同一份 out/ 产物）
server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;

  gzip on;
  gzip_types application/javascript text/css application/json image/svg+xml;

  # 运行时配置必须每次取最新（容器启动时生成，ADR-0007）
  location = /config.json {
    add_header Cache-Control "no-store";
  }

  # 带内容哈希的静态资源永久缓存
  location /_next/static/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # 目录索引（trailingSlash 导出）；未知路径统一落 404 页
  location / {
    try_files $uri $uri/index.html $uri.html /404.html;
    add_header Cache-Control "no-cache";
  }

  error_page 404 /404.html;
}
