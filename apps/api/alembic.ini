# 开发 CLI 便利入口（运行时不读本文件 —— sag_api.db.migrate 程序化构建配置）。
# 用法示例：
#   SAG_DATABASE_URL=sqlite+aiosqlite:////tmp/x.db .venv/bin/alembic revision --autogenerate -m "..."
[alembic]
script_location = sag_api/db/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
